<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Os Meus Links</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f5f7; --white: #ffffff; --accent: #5b4ef5; --accent-light: #ede9fe;
    --text: #111; --muted: #888; --border: #e0e0e8; --danger: #e53935;
    --link-bg: #eef6ff; --link-border: #b8d9ff; --link-color: #1768c9;
    --note-bg: #fff9e6; --note-border: #f0d060; --note-color: #9a7b00;
    --star: #f5c518; --radius: 14px;
  }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 40px; }

  header { background: var(--accent); color: #fff; padding: 22px 20px 18px; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 1.3rem; font-weight: 700; }
  .badge { background: #ffffff30; border-radius: 20px; padding: 3px 12px; font-size: 0.78rem; font-weight: 600; }

  .type-switch { display: flex; margin: 16px 16px 0; background: var(--white); border-radius: 12px; padding: 4px; gap: 4px; box-shadow: 0 2px 8px #0000000a; }
  .type-btn { flex: 1; padding: 10px; border: none; border-radius: 9px; font-family: 'Inter', sans-serif; font-size: 0.88rem; font-weight: 600; cursor: pointer; background: transparent; color: var(--muted); transition: all 0.15s; }
  .type-btn.active.link-active { background: var(--link-color); color: #fff; }
  .type-btn.active.note-active { background: var(--note-color); color: #fff; }

  .add-box { background: var(--white); margin: 10px 16px 0; border-radius: var(--radius); padding: 16px; box-shadow: 0 2px 8px #0000000a; display: flex; flex-direction: column; gap: 10px; }
  .add-box input, .add-box select, .add-box textarea { width: 100%; background: var(--bg); border: 1.5px solid var(--border); border-radius: 10px; padding: 12px 14px; color: var(--text); font-size: 0.95rem; font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.2s; resize: none; }
  .add-box input:focus, .add-box select:focus, .add-box textarea:focus { border-color: var(--accent); background: #fff; }
  .add-box input::placeholder, .add-box textarea::placeholder { color: #bbb; }
  .row { display: flex; gap: 8px; }
  .row select { flex: 1; }
  .btn-save { background: var(--accent); color: #fff; border: none; border-radius: 10px; padding: 12px 20px; font-family: 'Inter', sans-serif; font-weight: 700; font-size: 0.95rem; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
  .btn-save:active { opacity: 0.85; }
  .newcat-toggle { background: none; border: none; color: var(--accent); font-size: 0.82rem; font-family: 'Inter', sans-serif; cursor: pointer; text-align: left; padding: 0; font-weight: 500; }
  .newcat-row { display: flex; gap: 8px; }
  .newcat-row input { flex: 1; font-size: 0.9rem; padding: 10px 12px; }
  .btn-create { background: var(--accent-light); color: var(--accent); border: none; border-radius: 10px; padding: 10px 16px; font-family: 'Inter', sans-serif; font-weight: 700; font-size: 0.85rem; cursor: pointer; white-space: nowrap; }

  /* TABS BAR */
  .tabs-wrap { display: flex; align-items: center; gap: 8px; padding: 14px 16px 0; }
  .tabs { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; flex: 1; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { flex-shrink: 0; padding: 6px 16px; border-radius: 20px; font-size: 0.82rem; font-weight: 600; cursor: pointer; border: 1.5px solid var(--border); background: var(--white); color: var(--muted); transition: all 0.15s; }
  .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-manage-cats { flex-shrink: 0; background: none; border: none; font-size: 1.1rem; cursor: pointer; padding: 4px 6px; color: var(--muted); }

  /* MANAGE CATEGORIES PANEL */
  .manage-panel { display: none; margin: 10px 16px 0; background: var(--white); border-radius: var(--radius); padding: 14px 16px; box-shadow: 0 2px 8px #0000000a; }
  .manage-panel.open { display: block; }
  .manage-panel h3 { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
  .manage-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--bg); font-size: 0.9rem; }
  .manage-row:last-child { border-bottom: none; }
  .manage-del { background: #fde8e8; color: var(--danger); border: none; border-radius: 8px; padding: 5px 12px; font-size: 0.78rem; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; }

  .items-list { padding: 10px 16px 0; display: flex; flex-direction: column; gap: 8px; }

  /* LINK CARD - blue tone */
  .link-card { background: var(--link-bg); border: 1.5px solid var(--link-border); border-radius: var(--radius); padding: 13px 14px; display: flex; align-items: center; gap: 10px; box-shadow: 0 1px 4px #0000000a; transition: border-color 0.2s; }
  .link-card.starred { border-color: var(--star); box-shadow: 0 2px 10px #f5c51825; }
  .favicon { width: 34px; height: 34px; border-radius: 8px; background: #fff; display: flex; align-items: center; justify-content: center; font-size: 0.95rem; flex-shrink: 0; overflow: hidden; }
  .favicon img { width: 22px; height: 22px; object-fit: contain; }
  .link-info { flex: 1; min-width: 0; }
  .link-name { font-size: 0.9rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--link-color); }
  .link-domain { font-size: 0.75rem; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* NOTE CARD - yellow tone */
  .note-card { background: var(--note-bg); border: 1.5px solid var(--note-border); border-radius: var(--radius); padding: 14px; box-shadow: 0 1px 4px #0000000a; transition: border-color 0.2s; }
  .note-card.starred { border-color: var(--star); }
  .note-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 6px; }
  .note-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 1px; }
  .note-title { font-size: 0.88rem; font-weight: 700; flex: 1; color: var(--note-color); }
  .note-text { font-size: 0.88rem; color: #5c4a00; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
  .note-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }

  /* SHARED BUTTONS */
  .cat-tag { font-size: 0.7rem; background: #ffffffb0; color: #555; border-radius: 20px; padding: 2px 9px; font-weight: 600; flex-shrink: 0; white-space: nowrap; }
  .btn-open { background: var(--link-color); color: #fff; border: none; border-radius: 8px; padding: 7px 12px; font-size: 0.8rem; font-family: 'Inter', sans-serif; font-weight: 600; cursor: pointer; flex-shrink: 0; }
  .btn-edit { background: none; border: none; color: #999; cursor: pointer; font-size: 0.95rem; padding: 4px; flex-shrink: 0; }
  .btn-edit:active { color: var(--accent); }
  .btn-del { background: none; border: none; color: #ccc; cursor: pointer; font-size: 1rem; padding: 4px; flex-shrink: 0; }
  .btn-del:active { color: var(--danger); }
  .btn-star { background: none; border: none; cursor: pointer; font-size: 1.25rem; padding: 2px; flex-shrink: 0; line-height: 1; opacity: 0.25; transition: opacity 0.15s, transform 0.15s; }
  .btn-star.on { opacity: 1; }
  .btn-star:active { transform: scale(1.4); }

  .section-label { font-size: 0.72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; padding: 6px 2px 2px; }

  .empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 0.9rem; line-height: 1.7; }
  .empty-icon { font-size: 2rem; margin-bottom: 10px; }

  /* EDIT MODAL */
  .overlay { display: none; position: fixed; inset: 0; background: #000a; z-index: 100; align-items: flex-end; justify-content: center; }
  .overlay.open { display: flex; }
  .modal { background: var(--white); border-radius: 18px 18px 0 0; width: 100%; max-width: 520px; padding: 24px 18px 32px; display: flex; flex-direction: column; gap: 12px; }
  .modal h2 { font-size: 1.05rem; font-weight: 700; margin-bottom: 2px; }
  .modal input, .modal select, .modal textarea { width: 100%; background: var(--bg); border: 1.5px solid var(--border); border-radius: 10px; padding: 12px 14px; color: var(--text); font-size: 0.95rem; font-family: 'Inter', sans-serif; outline: none; resize: none; }
  .modal input:focus, .modal select:focus, .modal textarea:focus { border-color: var(--accent); background: #fff; }
  .modal-btns { display: flex; gap: 10px; margin-top: 4px; }
  .btn-primary { flex: 1; background: var(--accent); color: #fff; border: none; border-radius: 10px; padding: 13px; font-family: 'Inter', sans-serif; font-weight: 700; font-size: 0.92rem; cursor: pointer; }
  .btn-cancel { flex: 1; background: var(--bg); color: var(--text); border: none; border-radius: 10px; padding: 13px; font-family: 'Inter', sans-serif; font-weight: 600; font-size: 0.92rem; cursor: pointer; }
</style>
</head>
<body>

<header>
  <h1>📋 As Minhas Notas</h1>
  <span class="badge" id="total-count">0 itens</span>
</header>

<!-- EXPORT BAR -->
<div style="display:flex;gap:8px;margin:12px 16px 0;">
  <button onclick="exportTxt()" style="flex:1;display:flex;align-items:center;justify-content:center;gap:7px;background:#fff;border:1.5px solid #e0e0e8;border-radius:10px;padding:11px;font-family:'Inter',sans-serif;font-size:0.85rem;font-weight:600;color:#333;cursor:pointer;">
    💾 Guardar ficheiro
  </button>
  <button onclick="sendEmail()" style="flex:1;display:flex;align-items:center;justify-content:center;gap:7px;background:#fff;border:1.5px solid #e0e0e8;border-radius:10px;padding:11px;font-family:'Inter',sans-serif;font-size:0.85rem;font-weight:600;color:#333;cursor:pointer;">
    ✉️ Enviar por email
  </button>
</div>

<div class="type-switch">
  <button class="type-btn active link-active" id="btn-link" onclick="setType('link')">🔗 Link</button>
  <button class="type-btn" id="btn-note" onclick="setType('note')">📝 Texto</button>
</div>

<div class="add-box" id="form-link">
  <input type="url" id="f-url" placeholder="Cola aqui o link  (https://…)" autocomplete="off">
  <div class="row">
    <select id="f-cat-link"></select>
    <button class="btn-save" onclick="saveLink()">Guardar</button>
  </div>
  <button class="newcat-toggle" onclick="toggleNewCat('link')">＋ Nova categoria</button>
  <div class="newcat-row" id="newcat-link" style="display:none">
    <input type="text" id="f-newcat-link" placeholder="Nome da categoria…">
    <button class="btn-create" onclick="addCategory('link')">Criar</button>
  </div>
</div>

<div class="add-box" id="form-note" style="display:none">
  <input type="text" id="f-note-title" placeholder="Título (ex: Reunião, Ideia…)">
  <textarea id="f-note-text" rows="3" placeholder="Escreve o texto aqui…"></textarea>
  <div class="row">
    <select id="f-cat-note"></select>
    <button class="btn-save" onclick="saveNote()" type="button">Guardar</button>
  </div>
  <button class="newcat-toggle" onclick="toggleNewCat('note')">＋ Nova categoria</button>
  <div class="newcat-row" id="newcat-note" style="display:none">
    <input type="text" id="f-newcat-note" placeholder="Nome da categoria…">
    <button class="btn-create" onclick="addCategory('note')">Criar</button>
  </div>
</div>

<!-- TABS -->
<div class="tabs-wrap">
  <div class="tabs" id="tabs"></div>
  <button class="btn-manage-cats" onclick="toggleManagePanel()" title="Gerir categorias">⚙️</button>
</div>

<!-- MANAGE CATEGORIES PANEL -->
<div class="manage-panel" id="manage-panel">
  <h3>Gerir categorias</h3>
  <div id="manage-list"></div>
</div>

<div class="items-list" id="items-list"></div>

<!-- EDIT MODAL -->
<div class="overlay" id="overlay" onclick="closeModalBg(event)">
  <div class="modal" id="modal-content"></div>
</div>

<script>
  // Migração automática: procura dados de versões anteriores e usa-os se a versão atual estiver vazia
  function loadData() {
    const currentKey = 'meus-items-v3';
    const oldKeys = ['meus-items-v2', 'meus-items-v1', 'meus-links-v2', 'meus-links'];
    let current = JSON.parse(localStorage.getItem(currentKey) || 'null');
    if (current && current.items && current.items.length) return current;

    for (const k of oldKeys) {
      const old = JSON.parse(localStorage.getItem(k) || 'null');
      if (old && old.items && old.items.length) {
        const migrated = {
          categories: old.categories || ['Geral'],
          items: old.items.map(i => ({
            id: i.id || Date.now() + Math.random(),
            type: i.type || 'link',
            url: i.url || '',
            title: i.title || '',
            text: i.text || '',
            cat: i.cat || 'Geral',
            starred: !!i.starred
          }))
        };
        localStorage.setItem(currentKey, JSON.stringify(migrated));
        return migrated;
      }
    }
    return {
      categories: ['Geral', 'Trabalho', 'Pessoal'],
      items: [
        { id: 1, type: 'link', url: 'https://google.com', cat: 'Geral', starred: false },
        { id: 2, type: 'link', url: 'https://youtube.com', cat: 'Geral', starred: false },
        { id: 3, type: 'note', title: 'Exemplo de nota', text: 'Aqui podes guardar qualquer texto para não te esqueceres!', cat: 'Pessoal', starred: true }
      ]
    };
  }

  let data = loadData();
  let activeTab = 'Todos';
  let currentType = 'link';
  let editingId = null;

  function save() { localStorage.setItem('meus-items-v3', JSON.stringify(data)); }
  function getDomain(url) { try { return new URL(url).hostname.replace('www.', ''); } catch { return url; } }
  function getFavicon(url) { try { return `https://www.google.com/s2/favicons?domain=${new URL(url).hostname}&sz=64`; } catch { return null; } }
  function esc(s) { return (s || '').replace(/'/g, "&#39;").replace(/"/g, "&quot;"); }

  function setType(t) {
    currentType = t;
    document.getElementById('form-link').style.display = t === 'link' ? 'flex' : 'none';
    document.getElementById('form-note').style.display = t === 'note' ? 'flex' : 'none';
    document.getElementById('btn-link').classList.toggle('active', t === 'link');
    document.getElementById('btn-link').classList.toggle('link-active', t === 'link');
    document.getElementById('btn-note').classList.toggle('active', t === 'note');
    document.getElementById('btn-note').classList.toggle('note-active', t === 'note');
    renderSelects();
  }

  function render() { renderSelects(); renderTabs(); renderItems(); renderManagePanel(); updateCount(); }

  function renderSelects() {
    ['link','note'].forEach(t => {
      const sel = document.getElementById(`f-cat-${t}`);
      const cur = sel.value;
      sel.innerHTML = data.categories.map(c => `<option value="${esc(c)}">${c}</option>`).join('');
      if (data.categories.includes(cur)) sel.value = cur;
      else if (activeTab !== 'Todos' && activeTab !== '★' && data.categories.includes(activeTab)) sel.value = activeTab;
    });
  }

  function renderTabs() {
    const el = document.getElementById('tabs');
    const starCount = data.items.filter(i => i.starred).length;
    let html = `<button class="tab ${activeTab==='Todos'?'active':''}" onclick="setTab('Todos')">Todos (${data.items.length})</button>`;
    if (starCount > 0) html += `<button class="tab ${activeTab==='★'?'active':''}" onclick="setTab('★')">⭐ Favoritos (${starCount})</button>`;
    data.categories.forEach(cat => {
      const n = data.items.filter(i => i.cat === cat).length;
      html += `<button class="tab ${activeTab===cat?'active':''}" onclick="setTab('${esc(cat)}')">${cat} (${n})</button>`;
    });
    el.innerHTML = html;
  }

  function toggleManagePanel() {
    document.getElementById('manage-panel').classList.toggle('open');
  }

  function renderManagePanel() {
    const el = document.getElementById('manage-list');
    el.innerHTML = data.categories.map(cat => {
      const n = data.items.filter(i => i.cat === cat).length;
      return `<div class="manage-row">
        <span>${cat} <span style="color:var(--muted);font-size:0.8rem">(${n} item${n!==1?'s':''})</span></span>
        <button class="manage-del" onclick="delCat('${esc(cat)}')">Apagar</button>
      </div>`;
    }).join('') || '<p style="color:var(--muted);font-size:0.85rem">Sem categorias.</p>';
  }

  function cardHtml(item) {
    if (item.type === 'link') {
      const fav = getFavicon(item.url);
      const favHtml = fav ? `<img src="${fav}" onerror="this.parentElement.textContent='🔗'">` : '🔗';
      return `<div class="link-card ${item.starred?'starred':''}">
        <button class="btn-star ${item.starred?'on':''}" onclick="toggleStar(${item.id})" title="Favorito">⭐</button>
        <div class="favicon">${favHtml}</div>
        <div class="link-info">
          <div class="link-name">${getDomain(item.url)}</div>
          <div class="link-domain">${item.url.length > 34 ? item.url.slice(0,34)+'…' : item.url}</div>
        </div>
        <span class="cat-tag">${item.cat}</span>
        <button class="btn-open" onclick="window.open('${item.url}','_blank','noopener')">Abrir</button>
        <button class="btn-edit" onclick="openEdit(${item.id})" title="Editar">✏️</button>
        <button class="btn-del" onclick="delItem(${item.id})" title="Apagar">✕</button>
      </div>`;
    } else {
      return `<div class="note-card ${item.starred?'starred':''}">
        <div class="note-header">
          <button class="btn-star ${item.starred?'on':''}" onclick="toggleStar(${item.id})" title="Favorito">⭐</button>
          <span class="note-icon">📝</span>
          <span class="note-title">${item.title || 'Nota'}</span>
          <button class="btn-edit" onclick="openEdit(${item.id})" title="Editar">✏️</button>
          <button class="btn-del" onclick="delItem(${item.id})" title="Apagar">✕</button>
        </div>
        <div class="note-text">${item.text}</div>
        <div class="note-footer"><span class="cat-tag">${item.cat}</span></div>
      </div>`;
    }
  }

  function renderItems() {
    let list = activeTab === 'Todos' ? [...data.items]
      : activeTab === '★' ? data.items.filter(i => i.starred)
      : data.items.filter(i => i.cat === activeTab);

    const starred = list.filter(i => i.starred).reverse();
    const normal  = list.filter(i => !i.starred).reverse();

    const el = document.getElementById('items-list');
    if (!list.length) {
      el.innerHTML = `<div class="empty"><div class="empty-icon">✨</div>Sem itens aqui.<br>Adiciona um link ou texto acima!</div>`;
      return;
    }

    let html = '';
    if (starred.length) {
      html += `<div class="section-label">⭐ Favoritos</div>`;
      html += starred.map(cardHtml).join('');
    }
    if (normal.length) {
      if (starred.length) html += `<div class="section-label">Restantes</div>`;
      html += normal.map(cardHtml).join('');
    }
    el.innerHTML = html;
  }

  function updateCount() {
    document.getElementById('total-count').textContent = data.items.length + ' item' + (data.items.length !== 1 ? 's' : '');
  }

  function setTab(t) { activeTab = t; render(); }

  function toggleStar(id) {
    const item = data.items.find(i => i.id === id);
    if (item) { item.starred = !item.starred; save(); render(); }
  }

  function saveLink() {
    const inp = document.getElementById('f-url');
    const url = inp.value.trim();
    if (!url || !url.startsWith('http')) {
      inp.style.borderColor = '#e53935'; inp.focus();
      setTimeout(() => inp.style.borderColor = '', 1000); return;
    }
    const cat = document.getElementById('f-cat-link').value;
    data.items.push({ id: Date.now(), type: 'link', url, cat, starred: false });
    save(); render(); inp.value = ''; inp.focus();
  }

  function saveNote() {
    const inp = document.getElementById('f-note-text');
    const text = inp.value.trim();
    if (!text) {
      inp.style.borderColor = '#e53935'; inp.focus();
      setTimeout(() => inp.style.borderColor = '', 1000);
      return;
    }
    const title = document.getElementById('f-note-title').value.trim() || 'Nota';
    const catSel = document.getElementById('f-cat-note');
    const cat = catSel.value || data.categories[0];
    data.items.push({ id: Date.now(), type: 'note', title, text, cat, starred: false });
    save();
    render();
    document.getElementById('f-note-title').value = '';
    inp.value = '';
    inp.style.borderColor = '';
    inp.focus();
  }

  function delItem(id) {
    if (!confirm('Apagar este item?')) return;
    data.items = data.items.filter(i => i.id !== id);
    save(); render();
  }

  function delCat(cat) {
    const n = data.items.filter(i => i.cat === cat).length;
    const msg = n > 0 ? `Apagar categoria "${cat}"?\nOs ${n} item(s) passam para "Geral".` : `Apagar categoria "${cat}"?`;
    if (!confirm(msg)) return;
    data.items.forEach(i => { if (i.cat === cat) i.cat = 'Geral'; });
    data.categories = data.categories.filter(c => c !== cat);
    if (!data.categories.includes('Geral')) data.categories.unshift('Geral');
    if (activeTab === cat) activeTab = 'Todos';
    save(); render();
  }

  function toggleNewCat(t) {
    const row = document.getElementById(`newcat-${t}`);
    row.style.display = row.style.display === 'none' ? 'flex' : 'none';
    if (row.style.display === 'flex') document.getElementById(`f-newcat-${t}`).focus();
  }

  function addCategory(t) {
    const inp = document.getElementById(`f-newcat-${t}`);
    const val = inp.value.trim();
    if (!val) return;
    if (data.categories.includes(val)) { alert('Essa categoria já existe.'); return; }
    data.categories.push(val);
    save(); render();
    document.getElementById(`f-cat-${t}`).value = val;
    inp.value = '';
    document.getElementById(`newcat-${t}`).style.display = 'none';
  }

  // ── EDIT MODAL ─────────────────────────────────────────
  function openEdit(id) {
    const item = data.items.find(i => i.id === id);
    if (!item) return;
    editingId = id;
    const catOptions = data.categories.map(c => `<option value="${esc(c)}" ${c===item.cat?'selected':''}>${c}</option>`).join('');
    let html = `<h2>${item.type === 'link' ? '🔗 Editar Link' : '📝 Editar Nota'}</h2>`;
    if (item.type === 'link') {
      html += `<input type="url" id="e-url" value="${esc(item.url)}" placeholder="https://…">`;
    } else {
      html += `<input type="text" id="e-title" value="${esc(item.title)}" placeholder="Título">`;
      html += `<textarea id="e-text" rows="4" placeholder="Texto">${item.text}</textarea>`;
    }
    html += `<select id="e-cat">${catOptions}</select>`;
    html += `<div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" onclick="saveEdit()">Guardar alterações</button>
    </div>`;
    document.getElementById('modal-content').innerHTML = html;
    document.getElementById('overlay').classList.add('open');
  }

  function saveEdit() {
    const item = data.items.find(i => i.id === editingId);
    if (!item) return;
    if (item.type === 'link') {
      const url = document.getElementById('e-url').value.trim();
      if (!url || !url.startsWith('http')) { alert('Insere um link válido.'); return; }
      item.url = url;
    } else {
      const text = document.getElementById('e-text').value.trim();
      if (!text) { alert('O texto não pode estar vazio.'); return; }
      item.title = document.getElementById('e-title').value.trim() || 'Nota';
      item.text = text;
    }
    item.cat = document.getElementById('e-cat').value;
    save(); render(); closeModal();
  }

  function closeModal() {
    document.getElementById('overlay').classList.remove('open');
    editingId = null;
  }
  function closeModalBg(e) { if (e.target.id === 'overlay') closeModal(); }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.activeElement.id === 'f-url') saveLink();
    if (e.key === 'Enter' && document.activeElement.id === 'f-newcat-link') addCategory('link');
    if (e.key === 'Enter' && document.activeElement.id === 'f-newcat-note') addCategory('note');
  });

  function buildText() {
    const date = new Date().toLocaleString('pt-PT');
    let txt = `AS MINHAS NOTAS E LINKS\nExportado em: ${date}\n`;
    txt += '='.repeat(40) + '\n\n';
    data.categories.forEach(cat => {
      const items = data.items.filter(i => i.cat === cat);
      if (!items.length) return;
      txt += `[ ${cat.toUpperCase()} ]\n${'─'.repeat(30)}\n`;
      items.forEach(i => {
        const star = i.starred ? '⭐ ' : '';
        if (i.type === 'link') {
          txt += `${star}🔗 ${i.url}\n`;
        } else {
          txt += `${star}📝 ${i.title}\n   ${i.text.replace(/\n/g, '\n   ')}\n`;
        }
      });
      txt += '\n';
    });
    return txt;
  }

  function exportTxt() {
    const txt = buildText();
    const blob = new Blob([txt], { type: 'text/plain;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'minhas-notas.txt';
    a.click();
    URL.revokeObjectURL(a.href);
  }

  function sendEmail() {
    const txt = buildText();
    const subject = encodeURIComponent('As Minhas Notas e Links');
    const body = encodeURIComponent(txt);
    window.location.href = `mailto:?subject=${subject}&body=${body}`;
  }

  render();
</script>
</body>
</html>
