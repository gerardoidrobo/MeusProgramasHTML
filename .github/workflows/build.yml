name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Descompactar projeto
        run: unzip -o WifiSignalApp.zip

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Compilar APK (debug)
        working-directory: WifiSignalApp
        run: gradle assembleDebug

      - name: Enviar APK como artefato
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: WifiSignalApp/app/build/outputs/apk/debug/app-debug.apk
